name: Test Automation Framework Workflow

on:
  schedule:
    - cron: '00 18 * * *'
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout the Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Running Test Automation Framework with Maven
      run: mvn test -Dbrowser=chrome -DisLamdaTest=true -DisHeadless=false -X



    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with: 
        name: Test Logs
        path: logs/

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with: 
        name: Test Logs
        path: report.html

    - name: Test Execution Status
      run: echo 'Test Execution Completed'
